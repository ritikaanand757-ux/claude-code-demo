<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Task Manager</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .auth-header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .auth-form {
            padding: 40px;
        }

        .message {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: #ffe5e5;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .message.success {
            background: #e5f7ed;
            color: #27ae60;
            border: 1px solid #27ae60;
        }

        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        .auth-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .password-strength.weak {
            color: #e74c3c;
        }

        .password-strength.medium {
            color: #f39c12;
        }

        .password-strength.strong {
            color: #27ae60;
        }

        .validation-error {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .validation-error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Sign up to start managing your tasks</p>
        </div>

        <div class="auth-form">
            <div id="errorMessage" class="message error"></div>
            <div id="successMessage" class="message success"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username <span class="required">*</span></label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Choose a username"
                        required
                        autocomplete="username"
                    >
                    <div id="usernameError" class="validation-error"></div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="your@email.com"
                        required
                        autocomplete="email"
                    >
                    <div id="emailError" class="validation-error"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create a strong password"
                        required
                        autocomplete="new-password"
                    >
                    <div id="passwordStrength" class="password-strength"></div>
                    <div id="passwordError" class="validation-error"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Re-enter your password"
                        required
                        autocomplete="new-password"
                    >
                    <div id="confirmPasswordError" class="validation-error"></div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
            </form>

            <div class="auth-link">
                Already have an account? <a href="/static/login.html">Sign in here</a>
            </div>
        </div>
    </div>

    <script src="/static/auth.js"></script>
    <script>
        // Password strength indicator
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            const strengthIndicator = document.getElementById('passwordStrength');

            if (!password) {
                strengthIndicator.textContent = '';
                return;
            }

            const strength = checkPasswordStrength(password);
            strengthIndicator.textContent = `Password strength: ${strength.label}`;
            strengthIndicator.className = `password-strength ${strength.class}`;
        });

        function checkPasswordStrength(password) {
            let score = 0;

            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;

            if (score <= 2) return { label: 'Weak', class: 'weak' };
            if (score <= 4) return { label: 'Medium', class: 'medium' };
            return { label: 'Strong', class: 'strong' };
        }

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            // Reset messages
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
            document.querySelectorAll('.validation-error').forEach(el => el.classList.remove('show'));

            // Client-side validation
            let hasError = false;

            if (!username || username.length < 3) {
                showValidationError('usernameError', 'Username must be at least 3 characters');
                hasError = true;
            }

            if (!email || !isValidEmail(email)) {
                showValidationError('emailError', 'Please enter a valid email address');
                hasError = true;
            }

            if (!password || password.length < 8) {
                showValidationError('passwordError', 'Password must be at least 8 characters');
                hasError = true;
            }

            if (password !== confirmPassword) {
                showValidationError('confirmPasswordError', 'Passwords do not match');
                hasError = true;
            }

            if (hasError) return;

            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                await register(username, email, password);

                // Show success message
                showSuccess('Account created successfully! Redirecting to login...');

                // Redirect to login page after short delay
                setTimeout(() => {
                    window.location.href = '/static/login.html';
                }, 2000);
            } catch (error) {
                showError(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });

        function showValidationError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.classList.add('show');
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        }

        function showSuccess(message) {
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = message;
            successMsg.classList.add('show');
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // Check if user is already logged in
        if (isAuthenticated()) {
            window.location.href = '/static/index.html';
        }
    </script>
</body>
</html>
