name: Claude Code CI

# Trigger workflow on push to main and pull requests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Auto Test Runner - runs on every push to main
  auto-test-runner:
    name: Auto Test Runner
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    # PostgreSQL service container
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: taskmanager_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager_db
      SECRET_KEY: test-secret-key-for-ci-only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "✅ PostgreSQL is ready!"

      - name: Run database migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Report status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Tests passed!"
          else
            echo "❌ Tests failed!"
            exit 1
          fi

  # Job 2a: Black formatting check - runs on every pull request (no database needed)
  auto-black-check:
    name: Auto Black Formatting Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Black
        run: |
          python -m pip install --upgrade pip
          pip install black

      - name: Run Black code formatting check
        run: |
          python -m black backend/ --check

      - name: Report status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Black formatting check passed!"
          else
            echo "❌ Black formatting check failed!"
            exit 1
          fi

  # Job 2b: Auto Code Quality Check - runs tests on every pull request
  auto-code-quality-check:
    name: Auto Code Quality Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    # PostgreSQL service container
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: taskmanager_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager_db
      SECRET_KEY: test-secret-key-for-ci-only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "✅ PostgreSQL is ready!"

      - name: Run database migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Post status as PR check
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Code quality checks passed!"
          else
            echo "❌ Code quality checks failed!"
            exit 1
          fi

  # Job 3: Auto Documentation Check - runs on merge to main
  auto-documentation-check:
    name: Auto Documentation Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify README.md exists and is not empty
        run: |
          if [ ! -f "README.md" ]; then
            echo "❌ README.md does not exist!"
            exit 1
          fi
          if [ ! -s "README.md" ]; then
            echo "❌ README.md is empty!"
            exit 1
          fi
          echo "✅ README.md exists and is not empty"

      - name: Verify docs/API.md exists
        run: |
          if [ ! -f "docs/API.md" ]; then
            echo "❌ docs/API.md does not exist!"
            exit 1
          fi
          echo "✅ docs/API.md exists"

      - name: Report documentation status
        if: always()
        run: |
          echo "📚 Documentation check completed"
          if [ $? -eq 0 ]; then
            echo "✅ All documentation files are present!"
          else
            echo "❌ Documentation check failed!"
            exit 1
          fi
