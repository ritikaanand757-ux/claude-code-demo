name: Claude Code CI

# Trigger workflow on push to main and pull requests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Auto Test Runner - runs on every push to main
  auto-test-runner:
    name: Auto Test Runner
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Report status
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Tests passed!"
          else
            echo "❌ Tests failed!"
            exit 1
          fi

  # Job 2: Auto Code Quality Check - runs on every pull request
  auto-code-quality-check:
    name: Auto Code Quality Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black

      - name: Run Black code formatting check
        run: |
          python -m black backend/ --check

      - name: Run tests
        run: |
          python -m pytest tests/ -v

      - name: Post status as PR check
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Code quality checks passed!"
          else
            echo "❌ Code quality checks failed!"
            exit 1
          fi

  # Job 3: Auto Documentation Check - runs on merge to main
  auto-documentation-check:
    name: Auto Documentation Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify README.md exists and is not empty
        run: |
          if [ ! -f "README.md" ]; then
            echo "❌ README.md does not exist!"
            exit 1
          fi
          if [ ! -s "README.md" ]; then
            echo "❌ README.md is empty!"
            exit 1
          fi
          echo "✅ README.md exists and is not empty"

      - name: Verify docs/API.md exists
        run: |
          if [ ! -f "docs/API.md" ]; then
            echo "❌ docs/API.md does not exist!"
            exit 1
          fi
          echo "✅ docs/API.md exists"

      - name: Report documentation status
        if: always()
        run: |
          echo "📚 Documentation check completed"
          if [ $? -eq 0 ]; then
            echo "✅ All documentation files are present!"
          else
            echo "❌ Documentation check failed!"
            exit 1
          fi
