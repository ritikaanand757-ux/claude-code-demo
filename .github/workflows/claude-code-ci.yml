name: Claude Code CI

# Trigger workflow on push to main, pull requests, and manual dispatch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering from GitHub UI

jobs:
  test-with-claude-code:
    name: Run Tests with Claude Code
    runs-on: ubuntu-latest

    # Environment variables for the entire job
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: test-secret-key-for-ci
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context

      # Step 2: Set up Python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # Cache pip dependencies

      # Step 3: Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-xdist  # Additional testing tools

      # Step 4: Install Claude Code CLI (if not already available)
      - name: Install Claude Code CLI
        run: |
          # Install Claude Code CLI using npm
          npm install -g @anthropic/claude-code
          claude --version

      # Step 5: Set up database
      - name: Set up test database
        run: |
          # Create test database using Alembic migrations
          alembic upgrade head

      # Step 6: Run linting checks using Claude Code
      - name: Run linting with Claude Code
        continue-on-error: true  # Don't fail workflow if linting has warnings
        run: |
          # Use Claude Code in headless mode to run linting checks
          claude --headless "Run flake8 linting on the backend directory and report any issues"

      # Step 7: Run tests using Claude Code
      - name: Run tests with Claude Code
        run: |
          # Use Claude Code in headless mode to run pytest
          claude --headless "Run pytest with coverage report: pytest --cov=backend --cov-report=term-missing tests/"

      # Step 8: Alternative - Run tests directly (fallback)
      - name: Run tests directly (fallback)
        if: failure()  # Run if Claude Code step fails
        run: |
          pytest --cov=backend --cov-report=xml --cov-report=term-missing tests/

      # Step 9: Upload coverage report
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()  # Upload even if tests fail
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      # Step 10: Run code quality checks with Claude Code
      - name: Code quality analysis with Claude Code
        continue-on-error: true
        run: |
          # Use Claude Code to analyze code quality
          claude --headless "Analyze the codebase for potential issues and provide a summary report"

      # Step 11: Generate test report
      - name: Generate test report
        if: always()
        run: |
          pytest --html=report.html --self-contained-html tests/ || true

      # Step 12: Upload test report as artifact
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: report.html

  # Additional job: Code review with Claude Code
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic/claude-code
          claude --version

      - name: AI Code Review
        run: |
          # Get the diff for the PR
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

          # Use Claude Code to review the changes
          claude --headless "Review the code changes in pr_diff.txt and provide feedback on code quality, potential bugs, and adherence to the project's CLAUDE.md guidelines"

      - name: Comment on PR (if issues found)
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🤖 AI Code Review\n\nClaude Code has completed the code review. Check the workflow logs for detailed feedback.'
            })

  # Additional job: Documentation check
  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic/claude-code

      - name: Check documentation completeness
        continue-on-error: true
        run: |
          # Use Claude Code to verify documentation is up to date
          claude --headless "Check if the API documentation in docs/API.md matches the actual endpoints in backend/routes.py"

      - name: Check docstrings
        continue-on-error: true
        run: |
          # Use Claude Code to verify all functions have proper docstrings
          claude --headless "Verify that all functions in backend/ have proper docstrings following the project's standards in CLAUDE.md"

  # Summary job that depends on all other jobs
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test-with-claude-code, code-review, documentation-check]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "Test Job: ${{ needs.test-with-claude-code.result }}"
          echo "Code Review Job: ${{ needs.code-review.result }}"
          echo "Documentation Job: ${{ needs.documentation-check.result }}"

          if [ "${{ needs.test-with-claude-code.result }}" == "failure" ]; then
            echo "❌ Tests failed!"
            exit 1
          else
            echo "✅ All required checks passed!"
          fi
